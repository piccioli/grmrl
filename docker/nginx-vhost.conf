# Vhost GRMRL per nginx sul server host
# ============================================================
# INSTALLAZIONE:
#   sudo cp nginx-vhost.conf /etc/nginx/sites-available/grmrl
#   sudo ln -s /etc/nginx/sites-available/grmrl /etc/nginx/sites-enabled/grmrl
#   sudo nginx -t && sudo systemctl reload nginx
#
# CERTIFICATO SSL (dopo aver avviato i container):
#   sudo certbot --nginx -d grmrl.montagnaservizi.com
# ============================================================

server {
    listen 80;
    server_name grmrl.montagnaservizi.com;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
