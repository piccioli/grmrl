services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APP_ENV=production
    env_file:
      - .env
    volumes:
      - public_files:/var/www/html/public
      - storage_data:/var/www/html/storage
    networks:
      - grmrl

  db:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: grmrl
      MYSQL_USER: grmrl
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ugrmrl", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - grmrl

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8083:80"
    volumes:
      - public_files:/var/www/html/public:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - grmrl

volumes:
  db_data:
  public_files:
  storage_data:

networks:
  grmrl:
    driver: bridge
